<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: white;
}

@keyframes gradientBG {
    0% {background-position: 0%}
    50% {background-position: 100%}
    100% {background-position: 0%}
}

.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* PROFILE */
.profile {
    text-align: center;
}

.profile img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid #00f5d4;
    margin-bottom: 15px;
}

.profile h1 {
    font-size: 36px;
}

.profile h2 {
    font-size: 20px;
    color: #00f5d4;
    margin-top: 5px;
}

/* SKILLS BOX */
.roles {
    display: flex;
    gap: 15px;
    margin: 25px 0;
    flex-wrap: wrap;
    justify-content: center;
}

.role {
    padding: 10px 18px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

/* SOCIAL */
.social {
    margin-top: 20px;
}

.social a {
    margin: 0 10px;
    text-decoration: none;
    color: white;
    padding: 10px 15px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    transition: 0.3s;
}

.social a:hover {
    background: #00f5d4;
    color: black;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: #00f5d4;
    color: black;
    cursor: pointer;
    font-weight: bold;
}

/* TYPING TEXT */
.typing {
    margin-top: 10px;
    font-size: 18px;
    color: #ccc;
}

/* RESPONSIVE */
@media(max-width: 600px){
    .roles {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="profile">
        <img src="https://picsum.photos/200" alt="profile">
        <h1>Lokendra Bayak</h1>
        <h2 id="typing-text"></h2>
    </div>

    <div class="roles">
        <div class="role">YouTuber</div>
        <div class="role">Video Editor</div>
        <div class="role">Videographer</div>
        <div class="role">Content Creator</div>
        <div class="role">Photographer</div>
    </div>

    <button class="btn">Contact Me</button>

    <div class="social">
        <a href="https://www.youtube.com/@Lokendrabayak1" target="_blank">YouTube</a>
        <a href="https://www.instagram.com/lokendrabayak" target="_blank">Instagram</a>
      
    </div>

</div>

<script>
// Typing Effect
const text = ["Creative Storyteller", "Visual Artist", "Digital Creator"];
let index = 0;
let charIndex = 0;
let currentText = "";
let isDeleting = false;

function typeEffect() {
    if(index >= text.length) index = 0;

    currentText = text[index];

    if(!isDeleting){
        document.getElementById("typing-text").innerText = currentText.substring(0, charIndex++);
        if(charIndex > currentText.length){
            isDeleting = true;
            setTimeout(typeEffect, 1000);
            return;
        }
    } else {
        document.getElementById("typing-text").innerText = currentText.substring(0, charIndex--);
        if(charIndex < 0){
            isDeleting = false;
            index++;
        }
    }

    setTimeout(typeEffect, isDeleting ? 50 : 100);
}

typeEffect();
</script>

</body>
</html>
